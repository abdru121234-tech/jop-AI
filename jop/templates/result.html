<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نتائج التحليل</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="result-container" style="text-align: center; padding: 100px 20px;">
        <div class="result-card" style="background: white; padding: 40px; border-radius: 20px; max-width: 600px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <h1 style="color: #2d3436;">نتيجة المطابقة 📊</h1>
            <div style="font-size: 60px; font-weight: bold; color: #00b894; margin: 20px 0;">
                {{ score }}%
            </div>
            <p>لقد قمنا بتحليل ملفك للوظيفة: <strong>{{ job.title }}</strong></p>
            <hr>
            <h3>المهارات المطابقة المكتشفة:</h3>
            <p style="background: #f9f9f9; padding: 15px; border-radius: 10px; color: #2d3436;">
                {{ found|join(', ') if found else 'لم يتم العثور على مهارات مطابقة' }}
            </p>
            <br>
            <a href="/" style="color: #0984e3; text-decoration: none;">العودة للصفحة الرئيسية</a>
        </div>
    </div>
</body>
</html>
